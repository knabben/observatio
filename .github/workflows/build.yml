name: Build

on:
  push:
  pull_request:

jobs:
  lint-test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: cd front && pnpm install --frozen-lockfile

      - name: Run linters
        run: make lint-frontend

      - name: Run Tests
        run: make run-tests-frontend

  lint-test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Run Linter
        run: make lint-backend

      - name: Run tests
        run: make run-tests-backend

  build:
    runs-on: ubuntu-latest
    needs: ["lint-test-backend", "lint-test-frontend"]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: cd front && pnpm install --frozen-lockfile

      - name: Run Build
        run: make build
